          />
          <img
            src="https://raw.githubusercontent.com/abhisekghose5-oss/Committee/3affdd0fe065dd3e64a24beefc940280cce00c76/newGanesh2.jpg"
            alt="Ganesh Puja 3"
            onclick="openModal(this)"
            loading="lazy"
            width="1200"
            height="800"
          />
          <img
            src="https://raw.githubusercontent.com/abhisekghose5-oss/Committee/3affdd0fe065dd3e64a24beefc940280cce00c76/newGanesh3.jpg"
            alt="Ganesh Puja 4"
            onclick="openModal(this)"
            loading="lazy"
            width="1200"
            height="800"
          />
          <img
            src="https://raw.githubusercontent.com/abhisekghose5-oss/Committee/3affdd0fe065dd3e64a24beefc940280cce00c76/newGanesh4.jpg"
            alt="Ganesh Puja 5"

            height="800"
          />
        </div>
      </section>
    </main>

    <div id="imgModal" class="modal" aria-hidden="true" role="dialog">
      <span class="close" onclick="closeModal()" aria-label="Close"
        >&times;</span
      >
      <img class="modal-content" id="modalImg" alt="Expanded gallery image" />
      <div id="caption"></div>
    </div>

    <script>
      function openModal(img) {
        document.getElementById("imgModal").style.display = "block";
        document.getElementById("modalImg").src = img.src;
        document.getElementById("caption").innerHTML = img.alt || "";
        document
          .getElementById("imgModal")
          .setAttribute("aria-hidden", "false");
      }

      function closeModal() {
        document.getElementById("imgModal").style.display = "none";
        document.getElementById("imgModal").setAttribute("aria-hidden", "true");
      }

      window.addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeModal();
      });

      window.addEventListener("click", (event) => {
        const modal = document.getElementById("imgModal");
        if (event.target === modal) closeModal();
      });
    </script>
  </body>
</html>
